repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: secret-scan
        name: Secret scan
        entry: trufflehog filesystem --no-update .
        language: system
        pass_filenames: false

