name: Main CI

# Полный прогон после мержа в main + ручной запуск по кнопке (на любой выбранной
# ветке). Ловит то, что узкий PR-гейт (affected + not heavy) пропускает.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      markers:
        description: 'Какие тесты гонять'
        type: choice
        default: all
        options:
          - all          # все, включая heavy
          - heavy         # только тяжёлые
          - not heavy     # без тяжёлых

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  tests:
    uses: ./.github/workflows/_tests.yml
    with:
      # push в main → все тесты; ручной запуск → выбранный маркер.
      # markers — это choice (3 фикс. значения), поэтому значение, попадающее в
      # pytest, не может содержать инъекцию. all/push → пусто (все тесты),
      # иначе собираем безопасную -m "<expr>".
      markers: ${{ (inputs.markers == 'heavy' || inputs.markers == 'not heavy') && format('-m "{0}"', inputs.markers) || '' }}
