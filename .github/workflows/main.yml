name: Full tests (main)

# Полный прогон после мержа в main + ручной запуск по кнопке (на любой выбранной
# ветке). Ловит то, что узкий PR-гейт (affected + not heavy) пропускает.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      markers:
        description: 'pytest -m выражение БЕЗ -m (пусто = все; heavy; not heavy; smoke or integration …)'
        type: string
        default: ''

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  tests:
    uses: ./.github/workflows/_tests.yml
    with:
      # push в main → inputs пуст → все тесты; ручной запуск → заданное выражение.
      # _tests.yml кавычит markers и подставляет через env → инъекция невозможна.
      markers: ${{ inputs.markers || '' }}
