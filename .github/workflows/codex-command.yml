name: Codex commands (on demand)

# Codex-команды в PR-комментарии (от участника репо):
#   "@codex review"   — ревью PR;
#   "@codex <вопрос>" — ответ Codex (любой @codex, кроме "@codex review");
#     работает в общем треде и как reply под inline-находкой ревью.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codex-review:
    # Триггер: PR-коммент "@codex review" от участника репо (OWNER/MEMBER/COLLABORATOR).
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@codex review') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: [self-hosted, codex]
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Review PR with Codex
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/codex_review.py

  codex-answer:
    # Триггер: "@codex <вопрос>" (кроме "@codex review") от участника репо.
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@codex') &&
      !contains(github.event.comment.body, '@codex review') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: [self-hosted, codex]
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Answer in PR with Codex
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          QUESTION: ${{ github.event.comment.body }}
          MODE: issue
        run: python3 .github/scripts/codex_answer.py

  codex-answer-inline:
    # Триггер: "@codex <вопрос>" (кроме "@codex review") как reply под inline-находкой ревью.
    if: >
      github.event_name == 'pull_request_review_comment' &&
      contains(github.event.comment.body, '@codex') &&
      !contains(github.event.comment.body, '@codex review') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: [self-hosted, codex]
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Answer inline thread with Codex
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          QUESTION: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          MODE: inline
        run: python3 .github/scripts/codex_answer.py
