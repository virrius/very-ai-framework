name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # запускаемся только когда в комментарии есть упоминание @claude
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth-токен подписки Claude Pro/Max вместо API-ключа.
          # Сгенерировать: `claude setup-token` (формат sk-ant-oat01-...).
          # Внимание: расходует квоту твоей подписки — ок для нечастого @claude,
          # для тяжёлого CI Anthropic рекомендует обычный API-ключ.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # @claude в комментарии распознаётся автоматически
      - name: Skip notice
        if: env.CLAUDE_CODE_OAUTH_TOKEN == ''
        run: echo "CLAUDE_CODE_OAUTH_TOKEN не задан — @claude не сконфигурирован, пропуск (job зелёный)."
