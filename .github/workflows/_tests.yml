name: Tests (reusable)

on:
  workflow_call:
    inputs:
      markers:
        description: 'pytest -m <markers here> (напр. heavy, not heavy, smoke or integration); пусто = все'
        type: string
        default: ''
      changed_only:
        description: 'true = только тест-каталоги, затронутые изменениями ветки'
        type: boolean
        default: false
      python-version:
        type: string
        default: '3.12'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      test_dirs: ${{ steps.find.outputs.test_dirs }}          # каталоги для матрицы (при changed_only — только затронутые)
      all_test_dirs: ${{ steps.find.outputs.all_test_dirs }}  # все обнаруженные (для корректного --ignore в корне)
    steps:
      - uses: actions/checkout@v4
        with:
          # changed_only требует полную историю для merge-base; иначе хватает HEAD
          fetch-depth: ${{ inputs.changed_only && '0' || '1' }}
      - id: find
        shell: bash
        env:
          CHANGED_ONLY: ${{ inputs.changed_only }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          all=$(bash .github/scripts/discover-test-dirs.sh)
          dirs="$all"
          if [ "$CHANGED_ONLY" = "true" ] && [ "$all" != "[]" ]; then
            dirs=$(bash .github/scripts/changed-test-dirs.sh "$all" "$DEFAULT_BRANCH")
          fi
          echo "all_test_dirs=$all" >> "$GITHUB_OUTPUT"
          echo "test_dirs=$dirs"    >> "$GITHUB_OUTPUT"
          echo "::notice::test dirs: $dirs (discovered: $all)"

  test:
    needs: discover
    if: needs.discover.outputs.test_dirs != '[]'
    strategy:
      fail-fast: false
      matrix:
        test_dir: ${{ fromJSON(needs.discover.outputs.test_dirs) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install uv
      - name: pytest (${{ matrix.test_dir }})
        working-directory: ${{ matrix.test_dir }}
        shell: bash
        env:
          # через env, а не подстановку в текст команды → произвольный markers
          # не может выполнить shell (инъекция невозможна)
          MARKERS: ${{ inputs.markers }}
        run: |
          # корневой тест-каталог (.) не должен повторно собирать тесты вложенных
          # каталогов со своим окружением. Берём ПОЛНЫЙ список (all_test_dirs), а не
          # changed-подмножество — иначе при changed_only корень мог бы собрать
          # тесты незатронутого каталога.
          ignores=""
          if [ "${{ matrix.test_dir }}" = "." ]; then
            for d in $(printf '%s' '${{ needs.discover.outputs.all_test_dirs }}' | grep -o '"[^"]*"' | tr -d '"'); do
              [ "$d" = "." ] && continue
              ignores="$ignores --ignore=$d"
            done
          fi
          # [project] → ставим проект + dev-группу + все extras (тест-зависимости:
          # pytest-asyncio, httpx и т.п., в т.ч. старый extra [test]).
          # tooling-only (pytest-конфиг без [project]) → эфемерный venv, только pytest.
          if grep -q '^\[project\]' pyproject.toml 2>/dev/null; then
            envflag="--all-extras"
          else
            envflag="--no-project"
          fi
          # MARKERS берём из env и кавычим → одно выражение для -m, без инъекции
          marker_args=()
          [ -n "$MARKERS" ] && marker_args=(-m "$MARKERS")
          set +e
          uv run $envflag --with pytest pytest $ignores "${marker_args[@]}" -q
          rc=$?
          [ $rc -eq 5 ] && rc=0   # ничего не собрано → не падаем (тестов ещё нет)
          exit $rc
