name: Tests (reusable)

on:
  workflow_call:
    inputs:
      markers:
        description: 'pytest -m expression; пусто = все тесты'
        type: string
        default: ''
      affected:
        description: 'true = только окружения, затронутые изменениями ветки'
        type: boolean
        default: false
      python-version:
        type: string
        default: '3.12'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      envs: ${{ steps.find.outputs.envs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.affected && '0' || '1' }}
      - id: find
        shell: bash
        env:
          AFFECTED: ${{ inputs.affected }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          all=$(bash .github/scripts/discover-envs.sh)
          if [ "$AFFECTED" = "true" ] && [ "$all" != "[]" ]; then
            git fetch --no-tags --depth=100 origin "$DEFAULT_BRANCH" >/dev/null 2>&1 || true
            base=$(git merge-base "origin/$DEFAULT_BRANCH" HEAD 2>/dev/null || echo "")
            envs=$(bash .github/scripts/affected-envs.sh "$all" "$base")
          else
            envs="$all"
          fi
          echo "envs=$envs" >> "$GITHUB_OUTPUT"
          echo "::notice::test envs: $envs"

  test:
    needs: discover
    if: needs.discover.outputs.envs != '[]'
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.discover.outputs.envs) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install uv
      - name: pytest (${{ matrix.env }})
        working-directory: ${{ matrix.env }}
        shell: bash
        run: |
          # корневое окружение не должно повторно собирать тесты сервисов,
          # у которых есть собственное окружение (свой job)
          ignores=""
          if [ "${{ matrix.env }}" = "." ]; then
            for e in $(printf '%s' '${{ needs.discover.outputs.envs }}' | grep -o '"[^"]*"' | tr -d '"'); do
              [ "$e" = "." ] && continue
              ignores="$ignores --ignore=$e"
            done
          fi
          set +e
          uv run --with pytest pytest $ignores ${{ inputs.markers }} -q
          rc=$?
          [ $rc -eq 5 ] && rc=0   # ничего не собрано → не падаем (тестов ещё нет)
          exit $rc
