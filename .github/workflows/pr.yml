name: PR CI

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pytest
      - run: pytest tests/unit -q

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pytest
      - run: pytest tests/integration -q

  codex-review:
    # Автоматический Codex-ревью как часть CI — после прохождения тестов.
    # Подписка ChatGPT (auth.json на self-hosted runner), без OpenAI API.
    # skip:ai-review — опциональный escape-hatch, по умолчанию ревью идёт всегда.
    needs: [unit-tests, integration-tests]
    if: "!contains(github.event.pull_request.labels.*.name, 'skip:ai-review')"
    runs-on: [self-hosted, codex]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Review PR with Codex (subscription)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/codex_review.py
