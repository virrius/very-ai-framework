name: PR CI

# Гейт по PR: быстро и дёшево — затронутые окружения, без heavy. На push в feature
# CI не запускается, до PR качество держит pre-commit. Полный прогон с heavy — на
# push в main (см. main.yml).
on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  tests:
    uses: ./.github/workflows/_tests.yml
    with:
      markers: 'not heavy'
      affected: true

  codex-review:
    # ОПЦИЯ. Авто-ревью Codex при ОТКРЫТИИ PR. Включить — задать repo/org variable
    # CODEX_AUTO_REVIEW=true (по умолчанию переменной нет → условие ложно → джоб не бежит).
    # On-demand `@codex review` в комментарии работает всегда (см. codex-command.yml).
    # Осторожно на ПУБЛИЧНЫХ репо: риск инъекции инструкций из чужого PR.
    needs: [tests]
    if: >
      vars.CODEX_AUTO_REVIEW == 'true' &&
      github.event.action == 'opened' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, codex]
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - name: Review PR with Codex (subscription)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/codex_review.py
