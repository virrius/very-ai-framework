name: Manual — build & deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Services to build (comma-separated) or 'all'"
        required: true
        type: string
        default: all
      deploy:
        description: "Deploy after build?"
        required: true
        type: boolean
        default: false
      environment:
        description: "Target environment (must exist in repo Settings → Environments)"
        required: false
        type: string
        default: dev

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push services
        run: |
          INPUT="${{ inputs.service }}"
          for dir in services/*/; do
            svc=$(basename "$dir")
            if [ "$INPUT" = "all" ] || echo "$INPUT" | tr ',' '\n' | grep -qx "$svc"; then
              docker build -t "${{ env.IMAGE_PREFIX }}/${svc}:${{ steps.meta.outputs.tag }}" "$dir"
              docker push "${{ env.IMAGE_PREFIX }}/${svc}:${{ steps.meta.outputs.tag }}"
            fi
          done

  deploy:
    needs: build
    if: inputs.deploy == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Build .env (${{ inputs.environment }} config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi
      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ inputs.environment }}"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: >
            bash /srv/deploy/${{ inputs.environment }}/.github/scripts/deploy.sh
            ${{ inputs.environment }} ${{ github.repository }} ${{ needs.build.outputs.tag }} "${{ inputs.service }}"
