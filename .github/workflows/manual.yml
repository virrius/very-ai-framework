name: Manual — build & deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Services to build (comma-separated) or 'all'"
        required: true
        type: string
        default: all
      deploy:
        description: "Deploy after build?"
        required: true
        type: boolean
        default: false
      environment:
        description: "Target environment (must exist in repo Settings → Environments)"
        required: false
        type: string
        default: dev

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push services
        # inputs.service приходит через env (данные), а не вклеивается в текст скрипта —
        # иначе значение со shell-синтаксисом исполнилось бы (script injection).
        env:
          INPUT: ${{ inputs.service }}
        run: |
          IMAGE_PREFIX="ghcr.io/${GITHUB_REPOSITORY,,}"
          for dir in services/*/; do
            svc=$(basename "$dir")
            if [ "$INPUT" = "all" ] || echo "$INPUT" | tr ',' '\n' | grep -qx "$svc"; then
              docker build -t "${IMAGE_PREFIX}/${svc}:${{ steps.meta.outputs.tag }}" "$dir"
              docker push "${IMAGE_PREFIX}/${svc}:${{ steps.meta.outputs.tag }}"
            fi
          done

  deploy:
    needs: build
    if: inputs.deploy == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Build .env (${{ inputs.environment }} config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi
      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ inputs.environment }}"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        # Все подстановки идут через env и пробрасываются в удалённый шелл (envs:),
        # где раскрываются как данные — а не вклеиваются в текст script (script injection).
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_TAG: ${{ needs.build.outputs.tag }}
          DEPLOY_SERVICE: ${{ inputs.service }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,DEPLOY_ENV,DEPLOY_REPO,DEPLOY_TAG,DEPLOY_SERVICE
          script: >
            bash "/srv/deploy/$DEPLOY_ENV/.github/scripts/deploy.sh"
            "$DEPLOY_ENV" "$DEPLOY_REPO" "$DEPLOY_TAG" "$DEPLOY_SERVICE"
