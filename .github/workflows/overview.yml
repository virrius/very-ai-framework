name: Overview — build & publish on release

# На теге v* (или вручную): агент пишет HTML-страницы overview-сайта (и inline-SVG диаграммы
# через plantuml), CI публикует их на orphan-ветку `overview` и на GitHub Pages.
# Юзеру достаточно запушить тег. Публикация детерминирована; LLM работает только на шаге агента.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # пуш на ветку overview (НЕ main)
  pages: write      # публикация Pages
  id-token: write   # OIDC для claude-code-action и deploy-pages

concurrency:
  group: overview
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # код на теге + вся история (для changelog) + теги

      - id: rel
        name: Determine release name
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(git describe --tags --abbrev=0 2>/dev/null || echo manual)" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore prior overview baseline
        run: bash .github/scripts/overview_restore.sh

      - name: Install PlantUML (agent renders diagrams with it)
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends plantuml

      - name: Build site (agent writes HTML directly)
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464  # v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            Read .github/overview/overview-build.md and follow it to build the project's overview
            SITE for release ${{ steps.rel.outputs.name }} (date ${{ steps.rel.outputs.date }}).
            Honor .github/overview/overview.rules.md. Write the three pages into
            .github/overview/site/ (index.html, tech.html, changelog.html) using .github/overview/template
            (style.css + skeleton.html), update .github/overview/architecture/*.puml, render diagram
            SVGs with `plantuml -tsvg` and embed them inline. Edit files only under
            .github/overview/site and .github/overview/architecture. Do NOT commit or push.

      - id: gate
        name: Check site was produced
        run: |
          if [ -f .github/overview/site/index.html ]; then
            echo "ready=1" >> "$GITHUB_OUTPUT"
          else
            echo "ready=0" >> "$GITHUB_OUTPUT"
            echo "::warning::нет site/index.html (CLAUDE_CODE_OAUTH_TOKEN не задан и нет baseline) — пропуск публикации"
          fi

      - name: Add stylesheet + script to site
        if: steps.gate.outputs.ready == '1'
        run: cp .github/overview/template/{style.css,overview.js} .github/overview/site/

      - name: Publish site to overview branch
        if: steps.gate.outputs.ready == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/overview_publish.sh "${{ steps.rel.outputs.name }}"

      - name: Configure Pages
        if: steps.gate.outputs.ready == '1'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.gate.outputs.ready == '1'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github/overview/site

    outputs:
      ready: ${{ steps.gate.outputs.ready }}

  deploy:
    needs: build
    if: needs.build.outputs.ready == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
