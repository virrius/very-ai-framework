name: Release — stamp version & deploy prod

# Триггер: тег v*. Релиз НЕ пересобирает то, что push-main уже собрал:
# для каждого сервиса берётся готовый образ по sha его последнего изменения
# (≤ тег) и ретегается на :<vX>+:stable (manifest-copy в реестре, без сборки).
# Сборка — только fallback: образ не найден (multi-commit push / прочищен реестр).
# Корректно и для тега на HEAD, и на старый коммит main (адресация по sha, не :latest).

on:
  push:
    tags:
      - "v*"

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag must point at main
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main --quiet
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main \
            || { echo "::error::tag ${GITHUB_REF_NAME} is not on main"; exit 1; }

  # План релиза: делит сервисы на «ретег готового» и «fallback-сборка».
  # Для каждого сервиса резолвит sha последнего коммита (≤ тег), менявшего его
  # билд-вход (его папка или общие deploy-файлы) — push-main пометил образ этим sha.
  discover:
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      build_list: ${{ steps.plan.outputs.build_list }}
      retag_map:  ${{ steps.plan.outputs.retag_map }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: plan
        run: |
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          build='[]'; retag='[]'
          for SVC in $(bash .github/scripts/services.sh list | jq -r '.[]'); do
            SHA=$(git log -1 --format=%H "$GITHUB_SHA" -- \
                    "services/$SVC/" docker-compose.yml \
                    .github/scripts/deploy.sh .github/scripts/write-configs.sh)
            if [ -n "$SHA" ] && docker buildx imagetools inspect "$PREFIX/$SVC:$SHA" >/dev/null 2>&1; then
              retag=$(jq -c --arg s "$SVC" --arg sha "$SHA" '. + [{service:$s,sha:$sha}]' <<<"$retag")
            else
              build=$(jq -c --arg s "$SVC" '. + [$s]' <<<"$build")
            fi
          done
          echo "build_list=$build" >> "$GITHUB_OUTPUT"
          echo "retag_map=$retag"  >> "$GITHUB_OUTPUT"
          echo "BUILD (fallback): $build"
          echo "RETAG (готовые):  $retag"

  # Ретег уже собранных образов: <svc>:<sha> -> :<vX> + :stable. Без сборки и buildx-бутстрапа.
  retag:
    needs: [verify-tag, discover]
    if: ${{ needs.discover.outputs.retag_map != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp version onto prebuilt images
        env:
          RETAG_MAP: ${{ needs.discover.outputs.retag_map }}
          REF: ${{ github.ref_name }}
        run: |
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          jq -c '.[]' <<<"$RETAG_MAP" | while read -r row; do
            SVC=$(jq -r '.service' <<<"$row"); SHA=$(jq -r '.sha' <<<"$row")
            echo "retag $SVC: :$SHA -> :$REF, :stable"
            docker buildx imagetools create \
              -t "$PREFIX/$SVC:$REF" -t "$PREFIX/$SVC:stable" "$PREFIX/$SVC:$SHA"
          done

  # Fallback-сборка: только сервисы без готового образа (в норме матрица пуста → джоба скипается).
  build:
    needs: [verify-tag, discover]
    if: ${{ needs.discover.outputs.build_list != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.build_list) }}
    steps:
      - uses: actions/checkout@v4

      - id: img
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: |
            ${{ steps.img.outputs.prefix }}/${{ matrix.service }}:${{ github.ref_name }}
            ${{ steps.img.outputs.prefix }}/${{ matrix.service }}:stable

  deploy-prod:
    needs: [discover, retag, build]
    # Запускаемся, если discover ок, найден хотя бы один сервис, и ни retag, ни
    # build не упали (skipped — допустимо: один из списков может быть пуст).
    if: >-
      ${{ always()
          && needs.discover.result == 'success'
          && !(needs.discover.outputs.build_list == '[]' && needs.discover.outputs.retag_map == '[]')
          && needs.retag.result != 'failure' && needs.retag.result != 'cancelled'
          && needs.build.result  != 'failure' && needs.build.result  != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Build .env (prod config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi

      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ github.event.repository.name }}/prod"

      - name: Deploy all services to prod
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: bash /srv/deploy/${{ github.event.repository.name }}/prod/.github/scripts/deploy.sh prod ${{ github.repository }} ${{ github.ref_name }}
