name: Release — promote images & deploy prod

# Триггер: тег v*.
# Шаги: prepare (tag == HEAD main + фиксируем :latest в digest) → tests →
# promote (digest → :vX + :stable) → deploy-prod.

on:
  push:
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      services: ${{ steps.s.outputs.services }}
      digests: ${{ steps.pin.outputs.digests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag must point at current main HEAD
        # Строгое равенство, а не is-ancestor: релиз выкатывает состояние HEAD.
        # Тег на старом коммите промоутил бы не то состояние — запрещаем.
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main --quiet
          HEAD_SHA=$(git rev-parse refs/remotes/origin/main)
          [ "$GITHUB_SHA" = "$HEAD_SHA" ] || {
            echo "::error::tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) не на текущем HEAD main (${HEAD_SHA}). Тег должен стоять на HEAD. Перетегни актуальный main."
            exit 1
          }

      - id: s
        run: echo "services=$(bash .github/scripts/services.sh list)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pin
        # «Фото» образов: :latest -> неизменяемый digest, встык за проверкой тега.
        # Дальше релиз адресует только digest → перезапись :latest на dev не влияет.
        env:
          SERVICES: ${{ steps.s.outputs.services }}
        run: |
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          map='{}'
          for svc in $(printf '%s' "$SERVICES" | jq -r '.[]'); do
            if ! digest=$(docker buildx imagetools inspect "$PREFIX/$svc:latest" --format '{{.Manifest.Digest}}' 2>/dev/null); then
              echo "::error::образ $PREFIX/$svc:latest недоступен: нет в реестре или нет прав. Релиз промоутит готовое, а не пересобирает."
              exit 1
            fi
            echo "pin $svc -> $digest"
            map=$(jq -c --arg s "$svc" --arg d "$digest" '. + {($s): $d}' <<<"$map")
          done
          echo "digests=$map" >> "$GITHUB_OUTPUT"

  # Полный прогон тестов на релизном коммите. Упали → promote/deploy-prod не запустятся.
  tests:
    needs: prepare
    uses: ./.github/workflows/_tests.yml
    with:
      markers: ''

  # Промоут: для каждого сервиса зафиксированный digest -> :<vX> + :stable. Без сборки.
  promote:
    needs: [prepare, tests]
    if: ${{ needs.prepare.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp version onto pinned digest
        env:
          SVC: ${{ matrix.service }}
          REF: ${{ github.ref_name }}
          DIGEST: ${{ fromJson(needs.prepare.outputs.digests)[matrix.service] }}
        run: |
          [ -n "$DIGEST" ] || { echo "::error::нет зафиксированного digest для $SVC"; exit 1; }
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "promote $SVC: $DIGEST -> :$REF, :stable"
          docker buildx imagetools create \
            -t "$PREFIX/$SVC:$REF" -t "$PREFIX/$SVC:stable" "$PREFIX/$SVC@$DIGEST"

  deploy-prod:
    needs: [prepare, promote]
    if: ${{ needs.prepare.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Preflight — prod-конфиг задан
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          miss=""
          [ -n "$SSH_HOST" ] || miss="$miss SSH_HOST"
          [ -n "$SSH_USER" ] || miss="$miss SSH_USER"
          [ -n "$SSH_KEY" ]  || miss="$miss SSH_KEY"
          [ -z "$miss" ] || { echo "::error::нет prod-конфига:$miss (Environment prod → Variables/Secrets)"; exit 1; }

      - uses: actions/checkout@v4

      - name: Build .env (prod config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi

      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ github.event.repository.name }}/prod"

      - name: Deploy all services to prod
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: bash /srv/deploy/${{ github.event.repository.name }}/prod/.github/scripts/deploy.sh prod ${{ github.repository }} ${{ github.ref_name }}
