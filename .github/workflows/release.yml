name: Release — promote images & deploy prod

# Триггер: тег v*. Релиз НИЧЕГО не пересобирает.
# push-main на каждый мерж в main уже собрал изменённые сервисы и пометил их
# двумя тегами :<sha> и :latest. Сервис, который push-main не собирал, не менялся —
# значит его :latest уже актуален для HEAD main. Поэтому релиз — это чистый promotion:
# для КАЖДОГО сервиса берём текущий :latest и штампуем на него версию :<vX> + :stable
# через `docker buildx imagetools create` (manifest-copy в реестре, секунды, без buildx-бутстрапа).
# Если у сервиса нет :latest (ни разу не собран push-main) — падаем с понятной ошибкой,
# а не чиним пересборкой на лету: релиз промоутит, а не строит.
#
# Тег ОБЯЗАН стоять на текущем HEAD main (см. verify-tag): промоут адресует :latest =
# состояние HEAD, поэтому релиз со старого коммита промоутил бы не то состояние — запрещаем.

on:
  push:
    tags:
      - "v*"

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag must point at current main HEAD
        # Строгое равенство, а не is-ancestor: промоут берёт :latest = состояние HEAD.
        # Тег на старом коммите промоутил бы HEAD-образы под «старой» версией — запрещаем.
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main --quiet
          HEAD_SHA=$(git rev-parse refs/remotes/origin/main)
          [ "$GITHUB_SHA" = "$HEAD_SHA" ] || {
            echo "::error::tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) не на текущем HEAD main (${HEAD_SHA}). Релиз промоутит :latest = состояние HEAD — тег должен стоять на HEAD. Перетегни актуальный main."
            exit 1
          }

  discover:
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      services: ${{ steps.s.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        run: echo "services=$(bash .github/scripts/services.sh list)" >> "$GITHUB_OUTPUT"

  # Промоут: для каждого сервиса :latest -> :<vX> + :stable. Без сборки и без setup-buildx.
  promote:
    needs: [verify-tag, discover]
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp version onto current image
        env:
          SVC: ${{ matrix.service }}
          REF: ${{ github.ref_name }}
        run: |
          PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          SRC="$PREFIX/$SVC:latest"
          if ! docker buildx imagetools inspect "$SRC" >/dev/null 2>&1; then
            echo "::error::образ $SRC недоступен: нет в реестре или нет прав на чтение пакета. Релиз промоутит готовое, а не пересобирает."
            exit 1
          fi
          echo "promote $SVC: :latest -> :$REF, :stable"
          docker buildx imagetools create \
            -t "$PREFIX/$SVC:$REF" -t "$PREFIX/$SVC:stable" "$SRC"

  deploy-prod:
    needs: [discover, promote]
    if: ${{ needs.discover.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Build .env (prod config)
        env:
          APP_DOTENV: ${{ vars.APP_DOTENV }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          printf '%s\n' "$APP_DOTENV" > .env
          if [ -n "$APP_SECRET" ]; then printf 'APP_SECRET=%s\n' "$APP_SECRET" >> .env; fi

      - name: Copy compose + deploy script + env
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,.github/scripts/deploy.sh,.env"
          target: "/srv/deploy/${{ github.event.repository.name }}/prod"

      - name: Deploy all services to prod
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: bash /srv/deploy/${{ github.event.repository.name }}/prod/.github/scripts/deploy.sh prod ${{ github.repository }} ${{ github.ref_name }}
