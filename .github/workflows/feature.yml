name: Feature CI

on:
  push:
    branches: ["feature/**"]
  workflow_dispatch:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.14.0
      - name: Lint + format check
        run: |
          ruff check .
          ruff format --check .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps (+ project if packaged)
        run: |
          pip install pytest
          if grep -q '^\[project\]' pyproject.toml; then pip install .; fi
      - name: Light tests (heavy excluded)
        run: |
          [ -d tests ] || { echo "::notice::нет каталога tests — пропуск"; exit 0; }
          set +e; pytest -m "not heavy" -q; rc=$?
          [ $rc -eq 5 ] && rc=0   # exit 5 = тесты не собраны → не падаем
          exit $rc

  security:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip security]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-10

      - name: Deps audit
        run: |
          pip install pip-audit
          if grep -q '^\[project\]' pyproject.toml; then
            pip-audit .                      # читает зависимости из pyproject [project]
          else
            echo "::notice::в pyproject нет [project].dependencies — аудит пропущен"
          fi
